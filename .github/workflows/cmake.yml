---
name: CMake

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: ${{matrix.buildname}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO: Bump Windows to 6.11.x when aqtinstall supports it
          #       https://github.com/miurahr/aqtinstall/issues/1007
          - os: windows-latest
            buildname: Windows
            qt: '6.10.3'

          - os: macos-latest
            buildname: macOS
            qt: '6.11.1'

    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{matrix.qt}}
          cache: true

      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Set up MSVC
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvarsall.bat`" x64 && set" | ForEach-Object {
              if ($_ -match '^([^=]+)=(.*)$') {
                  "$($matches[1])=$($matches[2])" >> $env:GITHUB_ENV
              }
          }

      - name: Configure CMake
        run: >-
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTS=TRUE
          -DBUILD_EXAMPLE=TRUE

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  build_linux:
    name: Linux
    runs-on: ubuntu-latest

    env:
      # Required for Linux/X11 for running GUI tests.
      DISPLAY: ':99'

    steps:
      - name: Install dependencies
        run: >-
          sudo apt-get update -y && sudo apt-get install -y --no-install-recommends
          ninja-build
          openbox
          qt6-base-dev
          qt6-base-private-dev
          xvfb

      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Configure CMake
        run: >-
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTS=TRUE
          -DBUILD_EXAMPLE=TRUE
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install"

      - name: Build
        run: cmake --build build

      - name: Install with CMake
        run: cmake --install build

      - name: Start X11 and window manager
        shell: bash
        run: |
          Xvfb "$DISPLAY" -screen 0 800x600x24 & sleep 5
          openbox & sleep 8

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure
